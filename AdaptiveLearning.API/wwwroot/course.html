<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Курс — AdaptiveLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
/* ── SHARED DESIGN SYSTEM ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
[data-theme="dark"] {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --surface3:#2a2f45;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.12);
  --text:#e8eaf0; --muted:#7b7f96; --muted2:#9ca3b8;
  --accent:#6c63ff; --accent-hover:#7c75ff; --accent2:#ff6b9d;
  --green:#22d3a5; --yellow:#fbbf24; --red:#f87171; --blue:#60a5fa;
  --card-bg:#1a1d27; --input-bg:#22263a; --overlay:rgba(0,0,0,.6);
}
[data-theme="light"] {
  --bg:#f4f6ff; --surface:#ffffff; --surface2:#eef0fa; --surface3:#e5e9f8;
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.12);
  --text:#1a1d27; --muted:#6b7280; --muted2:#9ca3af;
  --accent:#6c63ff; --accent-hover:#7c75ff; --accent2:#ff6b9d;
  --green:#059669; --yellow:#d97706; --red:#dc2626; --blue:#2563eb;
  --card-bg:#ffffff; --input-bg:#f4f6ff; --overlay:rgba(255,255,255,.6);
}
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); transition:background .3s,color .3s; }

/* SIDEBAR */
.sidebar { width:240px; min-height:100vh; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:fixed; left:0; top:0; z-index:100; padding:20px 0; }
.sidebar-logo { padding:0 16px 24px; display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-box { width:34px; height:34px; background:var(--accent); border-radius:9px;
  display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.logo-label { font-weight:800; font-size:.95rem; color:var(--text); }
.nav-group { padding:0 10px; margin-bottom:6px; }
.nav-group-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:.08em; padding:0 8px; margin-bottom:4px; display:block; }
.nav-link { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:10px;
  font-size:13.5px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s;
  text-decoration:none; margin-bottom:2px; white-space:nowrap; }
.nav-link:hover { background:var(--surface2); color:var(--text); }
.nav-link.active { background:var(--accent); color:#fff; }
.nav-link i { font-size:1rem; flex-shrink:0; }
.nav-badge { margin-left:auto; background:var(--accent2); color:#fff;
  font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px; }
.sidebar-bottom { margin-top:auto; padding:0 10px; }
.user-pill { background:var(--surface2); border-radius:12px; padding:10px 12px;
  display:flex; align-items:center; gap:10px; }
.user-ava { width:34px; height:34px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.85rem; color:#fff; flex-shrink:0; }
.user-name { font-size:13px; font-weight:600; line-height:1.2; }
.user-role { font-size:11px; color:var(--muted); }
.logout-icon { margin-left:auto; color:var(--muted); cursor:pointer; font-size:1rem; transition:color .15s; flex-shrink:0; }
.logout-icon:hover { color:var(--red); }

/* MAIN */
.main { margin-left:240px; display:flex; flex-direction:column; min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 28px;
  display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:1.05rem; font-weight:700; }
.topbar-sub { font-size:13px; color:var(--muted); margin-left:2px; }
.topbar-right { display:flex; align-items:center; gap:8px; margin-left:auto; }
.search-wrap { position:relative; }
.search-wrap input { background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  padding:8px 14px 8px 36px; color:var(--text); font-size:13px; font-family:inherit; outline:none;
  width:220px; transition:border .15s,width .2s; }
.search-wrap input:focus { border-color:var(--accent); width:280px; }
.search-wrap input::placeholder { color:var(--muted); }
.search-wrap i { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.95rem; }
.icon-btn { width:34px; height:34px; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted); font-size:1rem; transition:all .15s; flex-shrink:0; }
.icon-btn:hover { color:var(--text); border-color:var(--accent); }
.lang-grp { display:flex; gap:3px; }
.lb { background:transparent; border:1px solid var(--border); color:var(--muted);
  font-size:11px; font-weight:600; padding:4px 9px; border-radius:7px; cursor:pointer; font-family:inherit; transition:all .15s; }
.lb.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* CONTENT */
.content { padding:24px 28px; flex:1; }
.page-head { margin-bottom:22px; }
.page-title { font-size:1.35rem; font-weight:800; }
.page-sub   { font-size:13px; color:var(--muted); margin-top:3px; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:14px; }
.card-p { padding:20px; }
.card-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.card-title i { color:var(--accent); }

/* STATS GRID */
.stats-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; }
.stat-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1rem; margin-bottom:10px; }
.stat-num  { font-size:1.55rem; font-weight:800; line-height:1; }
.stat-lbl  { font-size:12px; color:var(--muted); margin-top:3px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:8px 16px; border-radius:9px; font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; border:none; transition:all .15s; text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); transform:translateY(-1px); }
.btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-outline:hover { background:rgba(108,99,255,.1); }
.btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--text); }
.btn-danger  { background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.2); }
.btn-danger:hover { background:rgba(248,113,113,.2); }
.btn-sm { padding:5px 12px; font-size:12px; border-radius:7px; }
.btn-lg { padding:11px 24px; font-size:15px; border-radius:11px; }
.btn-full { width:100%; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none !important; }

/* INPUTS */
.field { margin-bottom:16px; }
.field label { font-size:12px; font-weight:600; color:var(--muted); display:block; margin-bottom:6px; }
.input { width:100%; background:var(--input-bg); border:1.5px solid var(--border); border-radius:10px;
  padding:10px 14px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border .15s; }
.input:focus { border-color:var(--accent); }
.input::placeholder { color:var(--muted); }
select.input { cursor:pointer; }
textarea.input { resize:vertical; min-height:80px; }

/* BADGES */
.badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
  padding:2px 9px; border-radius:20px; }
.badge-accent  { background:rgba(108,99,255,.15); color:var(--accent); }
.badge-green   { background:rgba(34,211,165,.15); color:var(--green); }
.badge-yellow  { background:rgba(251,191,36,.15); color:var(--yellow); }
.badge-red     { background:rgba(248,113,113,.15); color:var(--red); }
.badge-blue    { background:rgba(96,165,250,.15); color:var(--blue); }
.badge-pink    { background:rgba(255,107,157,.15); color:var(--accent2); }

/* TABLE */
.table-wrap { overflow-x:auto; border-radius:14px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; }
thead tr { background:var(--surface2); }
th { padding:11px 16px; font-size:12px; font-weight:700; color:var(--muted); text-align:left; white-space:nowrap; }
td { padding:12px 16px; font-size:13px; border-top:1px solid var(--border); }
tr:hover td { background:var(--surface2); }

/* ALERTS */
.alert { padding:10px 14px; border-radius:9px; font-size:13px; margin-bottom:14px; display:none; }
.alert-err { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); color:var(--red); }
.alert-ok  { background:rgba(34,211,165,.1);  border:1px solid rgba(34,211,165,.25);  color:var(--green); }

/* PROGRESS */
.progress { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--green)); }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:3px; }

/* SPINNER */
.spin { width:16px; height:16px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff;
  border-radius:50%; animation:_spin .7s linear infinite; display:inline-block; }
@keyframes _spin { to { transform:rotate(360deg) } }


.course-layout { display:grid; grid-template-columns:260px 1fr 280px; gap:16px; height:calc(100vh - 130px); }
.modules-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
.modules-header { padding:16px; border-bottom:1px solid var(--border); }
.modules-header-title { font-size:14px; font-weight:700; margin-bottom:10px; }
.mod-list { overflow-y:auto; flex:1; padding:8px; }
.mod-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px;
  cursor:pointer; transition:all .15s; margin-bottom:2px; }
.mod-item:hover { background:var(--surface2); }
.mod-item.active { background:rgba(108,99,255,.15); border:1px solid rgba(108,99,255,.3); }
.mod-item.done { opacity:.6; }
.mod-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center;
  justify-content:center; font-size:.85rem; flex-shrink:0; }
.mod-name  { font-size:12.5px; font-weight:500; line-height:1.3; }
.mod-meta  { font-size:11px; color:var(--muted); margin-top:1px; }
.content-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px;
  overflow:hidden; display:flex; flex-direction:column; }
.content-area { flex:1; padding:24px; overflow-y:auto; }
.content-empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--muted); text-align:center; gap:12px; }
.content-empty i { font-size:3rem; opacity:.2; }
.video-wrap { border-radius:12px; overflow:hidden; background:#000; }
.video-wrap iframe { width:100%; aspect-ratio:16/9; border:none; display:block; }
.content-title { font-size:1.1rem; font-weight:800; margin-bottom:12px; }
.content-desc  { color:var(--muted); font-size:14px; line-height:1.7; margin-bottom:20px; }
.quiz-q { background:var(--surface2); border-radius:12px; padding:16px; margin-bottom:14px; }
.quiz-q-text { font-size:14px; font-weight:600; margin-bottom:12px; }
.quiz-opt { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:9px;
  border:1.5px solid var(--border); cursor:pointer; margin-bottom:8px; font-size:13px;
  transition:all .15s; }
.quiz-opt:hover  { border-color:var(--accent); background:rgba(108,99,255,.08); }
.quiz-opt.sel    { border-color:var(--accent); background:rgba(108,99,255,.12); }
.quiz-opt.ok     { border-color:var(--green);  background:rgba(34,211,165,.1); }
.quiz-opt.wrong  { border-color:var(--red);    background:rgba(248,113,113,.1); }
.opt-letter { width:26px; height:26px; border-radius:7px; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.ai-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px;
  display:flex; flex-direction:column; overflow:hidden; }
.ai-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.ai-header-title { font-size:14px; font-weight:700; }
.ai-badge { font-size:10px; font-weight:700; background:rgba(34,211,165,.15); color:var(--green);
  padding:2px 8px; border-radius:20px; }
.ai-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
.ai-msg { max-width:90%; }
.ai-msg-bot { background:var(--surface2); border-radius:10px 10px 10px 3px; padding:10px 12px; font-size:13px; line-height:1.5; }
.ai-msg-user { background:var(--accent); color:#fff; border-radius:10px 10px 3px 10px;
  padding:10px 12px; font-size:13px; margin-left:auto; }
.ai-quick { padding:8px 12px; display:flex; gap:6px; flex-wrap:wrap; border-top:1px solid var(--border); }
.ai-quick-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted);
  font-size:11px; padding:4px 10px; border-radius:20px; cursor:pointer; font-family:inherit; transition:all .15s; }
.ai-quick-btn:hover { color:var(--text); border-color:var(--accent); }
.ai-input-row { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
.ai-input-row input { flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:8px 12px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.ai-input-row input:focus { border-color:var(--accent); }
.ai-send { width:34px; height:34px; background:var(--accent); border:none; border-radius:9px;
  color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; flex-shrink:0; }
.ai-send:hover { background:var(--accent-hover); }
.result-banner { border-radius:12px; padding:14px 16px; margin-top:16px; font-size:14px; }
.result-banner.ok  { background:rgba(34,211,165,.1); border:1px solid rgba(34,211,165,.2); color:var(--green); }
.result-banner.warn{ background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.2); color:var(--yellow); }
.result-banner.bad { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.2); color:var(--red); }

</style>
</head>
<body>
<aside class="sidebar">
  <a class="sidebar-logo" href="/index.html"><div class="logo-box">🎓</div><span class="logo-label">AdaptiveLearn</span></a>
  <div class="nav-group">
    <span class="nav-group-label">Главное</span>
    <a class="nav-link " href="/courses.html"><i class="bi bi-collection"></i>Курсы</a>

  </div>
  <div class="nav-group" style="margin-top:12px">
    <span class="nav-group-label">Обучение</span>
    <a class="nav-link" href="/courses.html"><i class="bi bi-book"></i>В процессе <span class="nav-badge" id="sb-inprogress">0</span></a>
    <a class="nav-link" href="/courses.html"><i class="bi bi-check2-circle"></i>Завершённые</a>
  </div>

    <span class="nav-group-label">Администратор</span>

</aside>
<div class="main">

    <div><div class="topbar-title">Курс</div></div>
    
    <div class="topbar-right">

<div id="course-topbar" style="margin-bottom:16px;display:flex;align-items:center;gap:12px">

</div>

<script>
const _html=document.documentElement;
function _applyTheme(t){_html.setAttribute("data-theme",t);localStorage.setItem("theme",t);const ic=document.getElementById("theme-icon");if(ic)ic.className=t==="dark"?"bi bi-sun":"bi bi-moon";}
function _toggleTheme(){_applyTheme(_html.getAttribute("data-theme")==="dark"?"light":"dark");}
_applyTheme(localStorage.getItem("theme")||"dark");
function _setLang(l){localStorage.setItem("lang",l);document.querySelectorAll(".lb").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));}
(function(){const l=localStorage.getItem("lang")||"ru";document.querySelectorAll(".lb").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));})();
function _logout(){localStorage.clear();window.location.href="/login.html";}
function _initSidebar(){
  const nm=localStorage.getItem("name")||"?";
  const rl=localStorage.getItem("role")||"Student";
  const av=document.getElementById("sb-av");if(av)av.textContent=nm.charAt(0).toUpperCase();
  const sn=document.getElementById("sb-name");if(sn)sn.textContent=nm;
  const sr=document.getElementById("sb-role");if(sr)sr.textContent=rl==="Admin"?"Администратор":"Студент";
  const an=document.getElementById("admin-nav");if(an)an.style.display=rl==="Admin"?"block":"none";
}
requireAuth();
updateNavbar();
_initSidebar();

const params=new URLSearchParams(location.search);
const courseId=params.get('id');
let modules=[],currentMod=null,quizAnswers={},currentTopic='';

async function loadCourse(){
  const res=await authFetch('/courses/'+courseId);
  const c=await res.json();
  document.getElementById('course-name').textContent=c.title;
  currentTopic=c.title;
  const mRes=await authFetch('/courses/'+courseId+'/modules');
  modules=await mRes.json();
  renderMods();
  if(modules.length) openMod(modules[0]);
}

const MOD_ICONS={video:'bi-play-circle',text:'bi-file-text',audio:'bi-headphones',quiz:'bi-patch-question'};
const MOD_COLORS={video:'rgba(248,113,113,.15)',text:'rgba(96,165,250,.15)',audio:'rgba(34,211,165,.15)',quiz:'rgba(251,191,36,.15)'};
const MOD_TC={video:'var(--red)',text:'var(--blue)',audio:'var(--green)',quiz:'var(--yellow)'};

function renderMods(){
  document.getElementById('mod-list').innerHTML=modules.map((m,i)=>`
    <div class="mod-item" id="mi-${m.id}" onclick="openMod(modules[${i}])">
      <div class="mod-icon" style="background:${MOD_COLORS[m.contentType]||'var(--surface2)'}">
        <i class="bi ${MOD_ICONS[m.contentType]||'bi-circle'}" style="color:${MOD_TC[m.contentType]||'var(--muted)'}"></i>
      </div>
      <div style="min-width:0">
        <div class="mod-name">${m.title}</div>
        <div class="mod-meta">${m.contentType} · ${m.durationMinutes} мин</div>
      </div>
    </div>`).join('');
}

function openMod(m){
  currentMod=m; quizAnswers={};
  _modStartTime = Date.now(); // сбрасываем таймер
  document.querySelectorAll('.mod-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('mi-'+m.id);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const area=document.getElementById('content-area');
  if(m.contentType==='video') renderVideo(m,area);
  else if(m.contentType==='text') renderText(m,area);
  else if(m.contentType==='audio') renderAudio(m,area);
  else if(m.contentType==='quiz') renderQuiz(m,area);
  else renderText(m,area);
}

function renderVideo(m,area){
  const url=m.contentUrl?.includes('youtube.com/watch')?m.contentUrl.replace('watch?v=','embed/'):m.contentUrl;
  area.innerHTML=`<div class="content-title"><i class="bi bi-play-circle me-2" style="color:var(--red)"></i>${m.title}</div>
    <div class="video-wrap mb-3"><iframe src="${url}" allowfullscreen></iframe></div>
    <div class="content-desc">${m.description||''}</div>
    <button class="btn btn-primary" onclick="completeModule(-1)"><i class="bi bi-check-circle me-1"></i>Просмотрено</button>`;
}

function renderText(m,area){
  area.innerHTML=`<div class="content-title"><i class="bi bi-file-text me-2" style="color:var(--blue)"></i>${m.title}</div>
    <div class="content-desc" style="font-size:15px;line-height:1.8">${m.contentText||m.description||'Материал будет добавлен.'}</div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="completeModule(-1)"><i class="bi bi-check-circle me-1"></i>Прочитано</button>`;
}

function renderAudio(m,area){
  area.innerHTML=`<div class="content-title"><i class="bi bi-headphones me-2" style="color:var(--green)"></i>${m.title}</div>
    <div style="text-align:center;padding:30px 0"><i class="bi bi-headphones" style="font-size:4rem;color:var(--green);opacity:.4;display:block;margin-bottom:16px"></i>
    <audio controls style="width:100%;border-radius:9px" src="${m.contentUrl}"></audio></div>
    <div class="content-desc">${m.description||''}</div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="completeModule(-1)"><i class="bi bi-check-circle me-1"></i>Прослушано</button>`;
}

async function renderQuiz(m,area){
  const res=await authFetch('/courses/module/'+m.id+'/questions');
  const qs=await res.json();
  if(!qs.length){area.innerHTML='<div class="content-empty"><i class="bi bi-patch-question"></i><div>Вопросы ещё не добавлены</div></div>';return;}
  area.innerHTML=`<div class="content-title"><i class="bi bi-patch-question me-2" style="color:var(--yellow)"></i>${m.title}</div>
    <div id="quiz-body">${qs.map((q,i)=>`
      <div class="quiz-q">
        <div class="quiz-q-text">${i+1}. ${q.question}</div>
        ${['A','B','C','D'].map(op=>`<div class="quiz-opt" id="opt-${q.id}-${op}" onclick="pickAns(${q.id},'${op}','${q.correctAnswer}')">
          <span class="opt-letter">${op}</span>${q['option'+op]}</div>`).join('')}
      </div>`).join('')}</div>
    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="submitQuiz(${JSON.stringify(qs).replace(/"/g,'&quot;')})">
      <i class="bi bi-send me-1"></i>Сдать тест</button>`;
}

function pickAns(qId,opt,correct){
  quizAnswers[qId]=opt;
  ['A','B','C','D'].forEach(o=>{const el=document.getElementById('opt-'+qId+'-'+o);if(el)el.classList.remove('sel','ok','wrong');});
  const el=document.getElementById('opt-'+qId+'-'+opt);if(el)el.classList.add('sel');
}

function submitQuiz(qs){
  let ok=0;
  qs.forEach(q=>{
    const a=quizAnswers[q.id];if(!a)return;
    const el=document.getElementById('opt-'+q.id+'-'+a);
    const cel=document.getElementById('opt-'+q.id+'-'+q.correctAnswer);
    if(a===q.correctAnswer){ok++;if(el)el.classList.add('ok');}
    else{if(el)el.classList.add('wrong');if(cel)cel.classList.add('ok');}
  });
  const score=Math.round(ok/qs.length*100);
  completeModule(score,qs.length);
}

// Трекинг времени начала модуля
let _modStartTime = Date.now();

async function completeModule(score,total=0){
  if(!currentMod)return;
  const timeSpent = Math.round((Date.now() - _modStartTime) / 1000);
  const res=await authFetch('/courses/module/'+currentMod.id+'/complete',
    {method:'POST',body:JSON.stringify({score,timeSpentSec:timeSpent})});
  const data=await res.json();

  if(score>=0){
    const cls=score>=70?'ok':score>=40?'warn':'bad';
    const icon=score>=70?'✅':score>=40?'⚠️':'❌';
    const area=document.getElementById('content-area');
    area.insertAdjacentHTML('beforeend',`<div class="result-banner ${cls}">
      ${icon} Результат: <strong>${score}%</strong>
      ${score<60?' — Рекомендуем повторить тему':''}
      ${data.nextModuleTitle?'<br>→ Следующий модуль: <strong>'+data.nextModuleTitle+'</strong>':''}
      ${data.aiPrediction?'<br>AI прогноз: <strong>'+data.aiPrediction+'</strong>':''}
    </div>`);
  }

  document.getElementById('mi-'+currentMod.id)?.classList.add('done');
  const done=document.querySelectorAll('.mod-item.done').length;
  const pct=Math.round(done/modules.length*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-bar').style.width=pct+'%';

  if(data.nextModuleId){
    const nx=modules.find(m=>m.id===data.nextModuleId);
    if(nx)setTimeout(()=>openMod(nx),2000);
  }
}

async function sendAi(){
  const inp=document.getElementById('ai-in');
  const q=inp.value.trim();if(!q)return;
  inp.value='';askAi(q);
}

async function askAi(q){
  const msgs=document.getElementById('ai-msgs');
  msgs.innerHTML+=`<div class="ai-msg" style="display:flex;justify-content:flex-end"><div class="ai-msg-user">${q}</div></div>`;
  const think=document.createElement('div');
  think.className='ai-msg';
  think.innerHTML='<div class="ai-msg-bot" style="color:var(--muted)"><span class="spin"></span> Думаю...</div>';
  msgs.appendChild(think);msgs.scrollTop=msgs.scrollHeight;
  try{
    const res=await authFetch('/ai/ask',{method:'POST',body:JSON.stringify({question:q,topic:currentTopic})});
    const d=await res.json();
    think.remove();
    msgs.innerHTML+=`<div class="ai-msg"><div class="ai-msg-bot">${d.answer||d.Answer||'...'}</div></div>`;
  }catch{think.remove();msgs.innerHTML+=`<div class="ai-msg"><div class="ai-msg-bot" style="color:var(--red)">AI недоступен</div></div>`;}
  msgs.scrollTop=msgs.scrollHeight;
}

loadCourse();

</script>
